{% extends "base.html" %}
{% block content %}
<div class="card">
  <h2>++ Novo_Acesso</h2>
  <form method="post" class="grid-form" style="margin-top:20px;">
    <div class="form-group"><label>Nome_Completo</label><input name="name" required></div>
    <div class="form-group"><label>E-mail_Login</label><input name="email" type="email" required></div>
    <div class="form-group"><label>Senha_Inicial</label><input name="password" type="password" required></div>
    <div class="form-group"><label>Perfil_Acesso</label><select name="role">{% for role in roles %}<option
          value="{{ role }}">{{ role|upper }}</option>{% endfor %}</select></div>
    <div style="grid-column: 1 / -1; text-align: right;"><button class="btn accent" type="submit"
        style="width:100%; max-width:250px;">Salvar_Registro</button></div>
  </form>
</div>
<div class="card">
  <h2>Acessos_Cadastrados</h2>
  <div class="table-wrap" style="margin-top:20px;">
    <table>
      <tr>
        <th>Nome</th>
        <th>E-mail</th>
        <th>Perfil</th>
        <th>Criado_Em</th>
        <th>Ações</th>
      </tr>
      {% for u in rows %}
      <tr>
        <td style="font-weight: 700;">{{ u.name }}</td>
        <td>{{ u.email }}</td>
        <td><span class="pill" style="background:#333; color:white; border:none;">{{ u.role|upper }}</span></td>
        <td style="font-size: 12px;">{{ u.created_at[:10] }}</td>
        <td>
          <div class="actions-flex">
            <a href="{{ url_for('edit_user', user_id=u.id) }}" class="btn secondary"
              style="padding: 4px 8px; font-size:11px;">Editar</a>
            <form action="{{ url_for('delete_user', user_id=u.id) }}" method="POST" style="margin:0;"
              onsubmit="return confirm('DELETAR usuário?');"><button type="submit" class="btn"
                style="padding: 4px 8px; font-size:11px; background:var(--p-danger); color:white;">[X]</button></form>
          </div>
        </td>
      </tr>
      {% endfor %}
    </table>
  </div>
</div>
{% endblock %}
