{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width: 700px; margin: 0 auto;">
  <h2>:: Editar_Empresa</h2>
  <form method="post" class="grid-form" style="margin-top:20px;">
    <div class="form-group" style="grid-column: 1 / -1;"><label>Nome / Razão Social</label><input name="name"
        value="{{ company.name }}" required></div>
    <div class="form-group"><label>Setor_Atuação</label><input name="sector" value="{{ company.sector or '' }}"></div>
    <div class="form-group"><label>Porte_Empresa</label><select name="size">{% for s in ['Pequena', 'Média', 'Grande',
        'Enterprise'] %}<option value="{{ s }}" {% if company.size==s %}selected{% endif %}>{{ s }}</option>{% endfor
        %}</select></div>
    <div class="form-group"><label>Nome_Contato</label><input name="contact_name"
        value="{{ company.contact_name or '' }}"></div>
    <div class="form-group"><label>E-mail_Contato</label><input name="contact_email" type="email"
        value="{{ company.contact_email or '' }}"></div>
    <div class="actions-bottom-flex"
      style="grid-column: 1 / -1; display:flex; gap:10px; justify-content: flex-end; margin-top:10px;">
      <a href="{{ url_for('companies') }}" class="btn secondary">Cancelar</a><button class="btn accent"
        type="submit">Salvar_Alterações</button>
    </div>
  </form>
</div>
{% endblock %}
