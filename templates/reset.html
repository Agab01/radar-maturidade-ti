{% extends "base.html" %}

{% block login_content %}
<div class="login-card">
  <div class="login-header">
    <div class="logo-wrap">
      <div class="logo-icon" style="background: var(--p-success); color: white;">#</div>
      <h1>NOVA_CHAVE</h1>
    </div>
    <p class="muted">Crie sua nova senha de acesso.</p>
  </div>

  {% with messages = get_flashed_messages() %}
    {% if messages %}
      {% for message in messages %}
        <div class="alert">{{ message }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <form method="post" action="{{ url_for('reset', email=email, token=token) }}">
    <div class="form-group">
      <label>_CONTA (USUÁRIO)</label>
      <input type="text" value="{{ email }}" disabled style="background: #e0e0e0; cursor: not-allowed;">
    </div>
    <div class="form-group">
      <label>_NOVA_SENHA</label>
      <input name="password" type="password" placeholder="••••••••" required minlength="6">
    </div>
    <button type="submit" style="background: var(--p-success); color: white; border-color: var(--fg);">_SALVAR_E_ACESSAR</button>
  </form>
</div>
{% endblock %}
