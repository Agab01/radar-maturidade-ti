{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 0 auto;">
  <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 20px; border-bottom: var(--border-thick); padding-bottom: 15px;">
    <div style="width: 40px; height: 40px; background: var(--fg); color: var(--p-warn); display: grid; place-items: center; font-family: 'Archivo Black', sans-serif; font-size: 20px;">*</div>
    <h2 style="margin: 0; background: none; color: var(--fg); padding: 0;">ALTERAR_CHAVE</h2>
  </div>

  <form method="post" style="display: flex; flex-direction: column; gap: 15px;">
    <div class="form-group" style="margin: 0;">
      <label>_CHAVE_ATUAL</label>
      <input name="current_password" type="password" placeholder="••••••••" required>
    </div>
    <div class="form-group" style="margin: 0;">
      <label>_NOVA_CHAVE (Mín. 6 caracteres)</label>
      <input name="new_password" type="password" placeholder="••••••••" required minlength="6" maxlength="30">
    </div>
    <div class="form-group" style="margin: 0;">
      <label>_CONFIRMAR_NOVA_CHAVE</label>
      <input name="confirm_password" type="password" placeholder="••••••••" required minlength="6" maxlength="30">
    </div>
    
    <div style="text-align: right; margin-top: 15px; display: flex; gap: 10px; justify-content: flex-end;">
      <a href="{{ url_for('dashboard') }}" class="btn secondary">CANCELAR</a>
      <button type="submit" class="btn accent" style="background: var(--fg); color: white;">_SALVAR_ALTERAÇÃO</button>
    </div>
  </form>
</div>
{% endblock %}
